<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Career Assessment Quiz</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h2>Career Assessment Quiz (30 Questions)</h2>
        <form method="POST" action="/submit-assessment">
            {% for q in questions %}
            <div class="quiz-section">
                <p class="question-text">{{ loop.index }}. {{ q.question }}</p>
                <div class="options">
                    {% for opt in q.options %}
                    <label class="option-label">
                        <input type="radio" name="q{{ loop.index }}" value="{{ opt }}" required> {{ opt }}
                    </label>
                    {% endfor %}
                </div>
            </div>
            <hr>
            {% endfor %}
            <button type="submit" class="submit-btn">Submit Assessment</button>
        </form>
    </div>
<form action="/result" method="POST">

</body>
</html>
