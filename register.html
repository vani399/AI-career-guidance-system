<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | Career Advisor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #eef2f7; /* light background */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-container {
            background: #ffffff; /* white/light form box */
            color: #333;
            padding: 40px 35px;
            border-radius: 15px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }

        .form-container h2 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2rem;
            color: #3f51b5; /* soft accent color */
        }

        .form-container p {
            text-align: center;
            font-size: 1rem;
            margin-bottom: 25px;
            color: #666; /* lighter text color */
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 1rem;
        }

        .register-btn {
            width: 100%;
            padding: 14px;
            background: #80cbc4; /* soft teal */
            color: #fff;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: background 0.3s;
        }

        .register-btn:hover {
            background: #4db6ac;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
        }

        .login-link a {
            color: #3f51b5; /* accent color */
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .error-msg {
            background: rgba(255,0,0,0.1);
            color: #d32f2f;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Create Student Account</h2>
        <p>Register to get personalized career and education</p>

        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/register">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" name="name" required placeholder="Enter your full name">
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" name="email" required placeholder="Enter your email">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Create a password">
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" required placeholder="Confirm your password">
            </div>

            <div class="input-group">
                <label>District</label>
                <select name="district" required>
                    <option value="">Select District</option>
                    <option>Madurai</option>
                    <option>Coimbatore</option>
                    <option>Erode</option>
                    <option>Salem</option>
                    <option>Thanjavur</option>
                    <option>Trichy</option>
                    <option>Chennai</option>
                    <option>Namakkal</option>
                    <option>Thirunelveli</option>
                    <option>Dindigul</option>
                    <option>Kanyakumari</option>
                    <option>Vellore</option>
                </select>
            </div>

            <div class="input-group">
                <label>Highest Qualification</label>
                <select name="qualification" required>
                    <option value="">Select</option>
                    <option>10th</option>
                    <option>12th</option>
                </select>
            </div>

            <button type="submit" class="register-btn">Register</button>
        </form>

        <p class="login-link">
            Already have an account? <a href="/login">Login here</a>
        </p>
    </div>
</body>
</html>
